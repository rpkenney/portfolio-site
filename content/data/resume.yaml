    - id: tools
      label: Tools
      items:
        - Git
        - Cursor
        - Claude Code

  # Web-only carousel (Step 2+); omitted from print. One slide per `groups` row.
  web:
    aria_label: "Skills: additional detail"
    slides:
      - id: languages-detail
        title: Languages
        items_layout: table
        table_first_column_header: Language
        table_columns:
          - Experience
          - Favorite feature
        intro: >-
          I have shipped code in a variety of languages. I prefer a functional style when it fits, but I appreciate
          OOP and defining interface contracts when a system needs clear boundaries.
        items:
          - name: Go
            table_cells:
              - Work (primary language)
              - Implicit interfaces, iter/Seq iterators.
          - name: Python
            table_cells:
              - Helper scripts, data wrangling
              - Fast iteration, good libraries/docs
          - name: SQL
            table_cells:
              - Work
              - CTEs; grammar is small enough for a clean AST
          - name: C++
            table_cells:
              - Personal projects
              - Explicit performance and resource control
          - name: Java
            table_cells:
              - Coursework
              - JVM/JIT, packaging and extensions that compose cleanly
          - name: JavaScript
            table_cells:
              - UI and small tools
              - Short path from idea to a solid, usable interface

      - id: infrastructure-detail
        title: Infrastructure
        intro: >-
          I care about how code becomes a running system, with emphasis on operability, reliability, and performance under real production constraints.
        items:
          - name: Kubernetes
            description: >-
              Getting workloads running and updated in-cluster, learning the scheduler and
              resource model, basic scaling strategies, and using kubectl when I need to see what’s
              going wrong.
          - name: Google Cloud Platform (GCP)
            description: >-
              Built and operated services on GKE, Pub/Sub, Cloud Storage, and Datastore; debugging production failure modes (retries, backpressure, partial outages), and reasoning about scaling and cost from logs/metrics.
          - name: Terraform
            description: >-
              I am comfortable with infra-as-code, making repeatable changes instead of manual clicks.

      - id: distributed-systems-detail
        title: Distributed Systems
        intro: >-
          I’m interested in systems that stay correct and predictable under load and failure, and the mechanics that drive performance and reliability.
        items:
          - name: Query planning and execution
            description: >-
              Latency-oriented reasoning about planning choices (ordering, grouping, join strategies) and how they map to physical execution.
          - name: Performance and cost
            description: >-
              Benchmarking with production-shaped workloads to evaluate trade-offs and validate changes with measurable impact.
          - name: Trino, Apache Iceberg, Spark
            description: >-
              Benchmarking and migration evaluation work comparing Trino (Iceberg) against BigQuery using production-shaped workloads, with attention to query performance, cost, and correctness trade-offs.

      - id: tools-detail
        title: Tools
        intro: >-
          I use these and other tools day-to-day to move quickly and stay organized.
        items:
          - name: Git
            description: >-
              Git for disciplined iteration, code review, and safe parallel development with branches and worktrees.
          - name: Claude Code
            description: >-
              I use Claude Code as a secondary accelerator for research, prototyping, and drafting design/context docs, then I iterate to a clean, reviewable implementation.
          - name: Cursor
            description: >-
              I use Cursor for fast investigation and debugging in complex codebases, and for high-leverage refactors where an assistant can speed up navigation and iteration.

