skills:
  section:
    heading: Skills
  groups:
    - id: languages
      label: Languages
      items:
        - Go
        - Python
        - SQL
        - C++
        - Java
        - JavaScript

    - id: distributed-data
      label: Distributed Systems / Infrastructure
      items:
        - Kubernetes
        - Google Cloud Platform (GCP)
        - BigQuery
        - Trino, Apache Iceberg, Spark
        - Terraform

    - id: infrastructure
      label: Tooling
      items:
        - Cursor
        - Claude Code
        - Git

  # Web-only carousel (Step 2+); omitted from print. One slide per `groups` row.
  web:
    aria_label: "Skills: additional detail"
    slides:
      - id: languages-detail
        title: Languages
        items_layout: table
        table_first_column_header: Language
        table_columns:
          - Experience
          - Favorite feature
        intro: >-
          I enjoy learning languages. I prefer a functional style when it fits, but I appreciate
          OOP and defining interface contracts when a system needs clear boundaries.
        items:
          - name: Go
            table_cells:
              - Work (primary language)
              - Implicit interfaces, iter/Seq iterators.
          - name: Python
            table_cells:
              - Helper scripts, data wrangling
              - Fast iteration, good libraries/docs
          - name: SQL
            table_cells:
              - Work
              - CTEs; grammar is small enough for a clean AST
          - name: C++
            table_cells:
              - Personal projects
              - Explicit performance and resource control
          - name: Java
            table_cells:
              - Coursework
              - JVM/JIT, packaging and extensions that compose cleanly
          - name: JavaScript
            table_cells:
              - UI and small tools
              - Short path from idea to a solid, usable interface

      - id: distributed-data-detail
        title: Distributed Systems / Data Infrastructure
        intro: >-
          I take great interest in understanding how code becomes a running system.
        items:
          - name: Kubernetes
            description: >-
              Getting workloads running and updated in-cluster, learning the scheduler and
              resource model, basic scaling strategies, and using kubectl when I need to see what’s
              going wrong.
          - name: Google Cloud Platform (GCP)
            description: >-
              Most of my GCP time is Pub/Sub, GKE, Datastore, Cloud Storage, and BigQuery:
              wiring services together, debugging from metrics/logs, and tracing how data flows
              through the system.
          - name: Trino, Apache Iceberg, Spark
            description: >-
              I like open-source tools in this space; we don’t run these in prod today. I’ve read
              up on them and benchmarked them against our stack (including Trino on Iceberg versus
              BigQuery) to compare performance and trade-offs.
          - name: Terraform
            description: >-
              I am comfortable with infra-as-code, making repeatable changes instead of manual clicks.

      - id: infrastructure-detail
        title: Tooling
        intro: >-
          I use these and other tools day-to-day to move quickly and stay organized.
        items:
          - name: Claude Code
            description: >-
              I use Claude Code for background development: multiple parallel agents to prep work
              into a reviewable state, then I iterate and refine. Over time I have built a knowledge
              base of codebase-specific context, style, and workflows, plus notes that serve as a
              reference for me and for Claude.
          - name: Cursor
            description: >-
              I use Cursor personally and professionally. It is great for quick, high-level
              investigations and debugging sessions, plus development where I am the
              primary driver.
          - name: Git
            description: >-
              Git is incredibly powerful, especially when paired with Claude Code and worktrees for
              parallel changes and clean iteration.

experience:
  section:
    heading: Experience
  positions:
    - id: pendo-swe
      title: Software Engineer
      seniority: mid
      company: Pendo
      location: Raleigh, NC
      employment: full_time
      start: "2024-06"
      end: null
      tenure:
        - start: "2024-06"
          end: "2024-08"
          arrangement: intern
          title: SWE Intern
        - start: "2024-08"
          end: "2025-05"
          arrangement: contractor
          title: Associate SWE (Contract)
        - start: "2025-05"
          end: "2026-02"
          arrangement: full_time
          title: Associate SWE

      highlights:
        - text: >-
            Reduced query latency by up to ~20% in production workloads by propagating sort
            preferences through the query planner, enabling scans to select optimal
            on-disk sort-order variants

        - text: >-
            Led benchmarking and migration evaluation for moving proprietary columnar data
            to Parquet, comparing Trino (Iceberg connector) vs BigQuery on Iceberg-backed
            datasets; validated performance using production-shaped workloads on GKE

        - text: >-
            Improved resilience of distributed query execution under load by refactoring
            coordinator–worker orchestration around a uniform polling model, ensuring
            consistent parent–child task dependency tracking during partial failures

        - text: >-
            Reduced annual infrastructure costs by $70K by implementing a read-through cache
            for a high-traffic entity, significantly lowering repeated backend load

        - text: >-
            Owned on-call responsibilities across multiple rotations, triaging and resolving
            customer-impacting production incidents end-to-end with root-cause mitigation

        - text: >-
            Automated cross-environment subscription migration workflows, replacing a
            multi-hour manual process with a repeatable and auditable pipeline

    - id: kimley-horn-intern
      title: Software Developer Intern
      company: Kimley-Horn
      location: Raleigh, NC
      employment: intern
      start: "2023-05"
      end: "2023-08"
      highlights:
        - text: >-
            Reduced payload size and improved responsiveness of large-scale data grids by
            implementing server-side pagination through a reusable query abstraction layer

        - text: >-
            Eliminated ~40 hours/week of manual processing by automating document intake using
            Azure AI Document Intelligence for structured data extraction

        - text: >-
            Replaced a manual Excel-based fleet tracking system with a full-stack workflow,
            improving operational visibility and enabling distributed team coordination

    - id: direct-supply-intern
      title: Software Engineer Intern
      company: Direct Supply
      location: Durham, NC
      employment: intern
      start: "2022-02"
      end: "2023-03"
      highlights:
        - text: >-
            Built CMS-based product-content segmentation logic to better organize and target
            content across two high-growth business segments

  web:
    aria_label: "Experience: expanded stories"
    slides:
      - id: pendo
        position_id: pendo-swe
        title: Pendo
        image: experience/pendo-chevron-pink.png
        image_alt: Pendo logo
        paragraphs:
          - >-
            Pendo gives software teams product analytics and in-app user guidance.
          - >-
            I interned, stayed on as a contractor while I finished my degree, and then joined
            full time. I work on a platform team focused on our custom internal data warehouse, tuned
            for how Pendo and our customers use the product. I spend most of my time on that
            stack in production, from the query and storage path to how we run and operate
            the services.
        skills:
          - Go
          - Google Cloud Platform
          - Kubernetes
          - distributed query planning (joins, grouping)
          - OLAP columnar storage (Parquet, Pendo internal)
          - Trino, Iceberg, Spark (exploratory)
          - on-call, incident response

      - id: kimley-horn
        position_id: kimley-horn-intern
        title: Kimley-Horn
        image: experience/kimley-horn.png
        image_alt: Kimley-Horn logo
        paragraphs:
          - >-
            Kimley-Horn is a large civil engineering firm with a nationwide presence.
          - >-
            I interned ten weeks and shipped across five internal apps, including a
            greenfield Blazor tool and a major overhaul and feature extension on another.
            It gave me an appreciation for tools that simplify work and for automation that
            saves time and cuts friction.
        skills:
          - Blazor, C#, SQL, JavaScript
          - Azure Document Intelligence

      - id: direct-supply
        position_id: direct-supply-intern
        title: Direct Supply
        image: experience/direct-supply.png
        image_alt: Direct Supply logo
        paragraphs:
          - >-
            Direct Supply serves senior care and health care, with a large in-house software
